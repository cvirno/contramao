<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contramao - Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #eee;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.brand{font-size:18px;font-weight:900;color:#1a1a1a}.brand em{color:#C0392B;font-style:normal}
.pill{font-size:10px;color:#888;background:#f4f6f9;padding:3px 10px;border-radius:20px;border:1px solid #e8e8e8;margin-left:10px;vertical-align:middle;font-weight:600}
.top-right{display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;border:1px solid #e8e8e8;background:#fff;color:#666}
.btn.red{background:#C0392B;border-color:#C0392B;color:#fff}
.wrap{max-width:1300px;margin:0 auto;padding:20px 16px}
.notice{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;border:1px solid #f5c0b8;background:#fdf0ef;color:#C0392B}
.hero{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:22px 20px;margin-bottom:18px}
.hero-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#C0392B;margin-bottom:5px}
.hero h2{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:14px}
.sbig{position:relative}
.sbig input{width:100%;padding:13px 16px 13px 44px;background:#f4f6f9;border:1.5px solid #e8e8e8;border-radius:10px;font-size:14px;color:#1a1a1a;font-family:Arial,sans-serif;outline:none}
.sbig input:focus{border-color:#C0392B;background:#fff}
.sbig input::placeholder{color:#bbb}
.sbig .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#ccc;font-size:18px}
.sres{display:none;background:#fff;border:1px solid #eee;border-radius:10px;margin-top:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);max-height:300px;overflow-y:auto}
.sres.show{display:block}
.sri{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.sri:hover{background:#fafafa}
.av{width:36px;height:36px;border-radius:50%;background:#fdf0ef;border:2px solid #f5c0b8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#C0392B;flex-shrink:0;margin-right:10px}
.sri-name{font-size:13px;font-weight:600;color:#1a1a1a}
.sri-sub{font-size:11px;color:#aaa;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.stat{background:#fff;border-radius:10px;padding:14px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent}
.stat.on{border-color:#C0392B}
.stat-bar{height:3px;border-radius:3px;margin-bottom:10px}
.stat .n{font-size:28px;font-weight:900;line-height:1;margin-bottom:3px}
.stat .l{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.tbl-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.tbl-top{padding:13px 18px;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tbl-title{font-size:13px;font-weight:700;color:#1a1a1a}
.tbl-count{font-size:11px;color:#aaa;background:#f4f6f9;border:1px solid #eee;padding:2px 10px;border-radius:20px;margin-left:8px;font-weight:600}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border:1.5px solid #e8e8e8;border-radius:20px;background:#fff;color:#aaa;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;font-weight:700}
.fbtn.active{border-color:#C0392B;background:#fdf5f4;color:#C0392B}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f9f9f9;color:#aaa;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #f0f0f0}
td{padding:12px 14px;border-bottom:1px solid #f8f8f8;vertical-align:middle;font-size:13px;color:#333}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa;cursor:pointer}
.cn{font-size:13px;font-weight:600;color:#1a1a1a}
.cs{font-size:11px;color:#bbb;margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-pend{background:#fff8e6;color:#d68910;border:1px solid #fde8a0}
.b-conf{background:#eafaf1;color:#1a7a4a;border:1px solid #a9dfbf}
.b-nao{background:#fdf0ef;color:#C0392B;border:1px solid #f5c0b8}
.b-pulse{background:#eaf4fb;color:#2980b9;border:1px solid #aed6f1}
.b-prop{background:#f4f6f9;color:#888;border:1px solid #e0e0e0}
.b-sim{background:#fdf0ef;color:#C0392B;border:1px solid #f5c0b8}
.b-ns{background:#f4f6f9;color:#ccc;border:1px solid #eee}
.bver{padding:5px 12px;background:#f4f6f9;color:#666;border:1px solid #eee;border-radius:6px;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;font-weight:700}
.bver:hover{border-color:#C0392B;color:#C0392B}
.empty{padding:50px;text-align:center;color:#ccc;font-size:14px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;justify-content:flex-end}
.ov.open{display:flex}
.ficha{background:#fff;width:100%;max-width:500px;height:100vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 30px rgba(0,0,0,.12)}
.fhd{background:#1a1a1a;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.fhd-l{display:flex;align-items:center;gap:12px}
.fav{width:42px;height:42px;border-radius:50%;background:#fdf0ef;border:2px solid #C0392B;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#C0392B;flex-shrink:0}
.fnm{font-size:15px;font-weight:700;color:#fff}
.fsb{font-size:11px;color:#666;margin-top:2px}
.fcls{background:none;border:1px solid #333;color:#888;font-size:18px;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.fbody{padding:18px 20px;flex:1}
.stblock{background:#f4f6f9;border-radius:8px;padding:12px;margin-bottom:18px}
.stblock label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#aaa;display:block;margin-bottom:6px}
.stsel{width:100%;padding:9px 12px;border:1.5px solid #e8e8e8;border-radius:7px;font-size:13px;font-family:Arial,sans-serif;outline:none;font-weight:600;color:#1a1a1a;background:#fff;cursor:pointer}
.fsec{margin-bottom:16px}
.fsec-t{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#ccc;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0f0f0}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fgrid.one{grid-template-columns:1fr}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:10px;color:#bbb;font-weight:600;text-transform:uppercase}
.fi input,.fi textarea{padding:8px 10px;border:1.5px solid #eee;border-radius:6px;font-size:13px;font-family:Arial,sans-serif;outline:none;color:#1a1a1a;background:#fff;width:100%}
.fi input:focus,.fi textarea:focus{border-color:#C0392B}
.fi textarea{min-height:54px;resize:vertical}
.fi-ro{padding:8px 10px;background:#f9f9f9;border:1px solid #f0f0f0;border-radius:6px;font-size:12px;color:#888}
.ffoot{padding:13px 20px;border-top:1px solid #f0f0f0;display:flex;gap:8px;position:sticky;bottom:0;background:#fff}
.bsave{flex:1;padding:10px;background:#C0392B;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.bcancel{padding:10px 14px;background:#fff;color:#aaa;border:1.5px solid #e8e8e8;border-radius:7px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif}
@media(max-width:1000px){.stats{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.wrap{padding:12px 10px}.topbar{padding:0 12px}.ficha{max-width:100%}.fgrid{grid-template-columns:1fr}th:nth-child(n+4),td:nth-child(n+4){display:none}th:last-child,td:last-child{display:table-cell}}
</style>
</head>
<body>
<div class="topbar">
  <div><span class="brand">CONTRA<em>MAO</em></span><span class="pill">Pulse Camp 2025</span></div>
  <div class="top-right">
    <button class="btn" onclick="loadData()">Atualizar</button>
    <button class="btn red" onclick="exportXL()">Exportar Excel</button>
  </div>
</div>
<div class="wrap">
  <div class="notice" id="notice"></div>
  <div class="hero">
    <div class="hero-lbl">Busca rapida</div>
    <h2>Encontre uma crianca ou responsavel</h2>
    <div class="sbig">
      <input type="text" id="hsearch" placeholder="Nome, CPF, telefone ou e-mail..." oninput="onSearch()" autocomplete="off">
      <span class="si">&#9906;</span>
    </div>
    <div class="sres" id="sres"></div>
  </div>
  <div class="stats">
    <div class="stat on" onclick="setF('todos')" id="st-todos"><div class="stat-bar" style="background:#C0392B"></div><div class="n" id="stTotal" style="color:#C0392B">0</div><div class="l">Total</div></div>
    <div class="stat" onclick="setF('confirmado')" id="st-confirmado"><div class="stat-bar" style="background:#1a7a4a"></div><div class="n" id="stConf" style="color:#1a7a4a">0</div><div class="l">Confirmados</div></div>
    <div class="stat" onclick="setF('pendente')" id="st-pendente"><div class="stat-bar" style="background:#d68910"></div><div class="n" id="stPend" style="color:#d68910">0</div><div class="l">Pendentes</div></div>
    <div class="stat" onclick="setF('nao-vai')" id="st-nao-vai"><div class="stat-bar" style="background:#e74c3c"></div><div class="n" id="stNaoVai" style="color:#e74c3c">0</div><div class="l">Nao vao</div></div>
    <div class="stat" style="cursor:default"><div class="stat-bar" style="background:#2980b9"></div><div class="n" id="stOnib" style="color:#2980b9">0</div><div class="l">Onibus</div></div>
    <div class="stat" style="cursor:default"><div class="stat-bar" style="background:#8e44ad"></div><div class="n" id="stSaude" style="color:#8e44ad">0</div><div class="l">Com saude</div></div>
  </div>
  <div class="tbl-card">
    <div class="tbl-top">
      <div><span class="tbl-title">Participantes</span><span class="tbl-count" id="tblCount">0</span></div>
      <div class="filters">
        <button class="fbtn active" data-f="todos" onclick="setFBtn(this)">Todos</button>
        <button class="fbtn" data-f="pendente" onclick="setFBtn(this)">Pendentes</button>
        <button class="fbtn" data-f="confirmado" onclick="setFBtn(this)">Confirmados</button>
        <button class="fbtn" data-f="nao-vai" onclick="setFBtn(this)">Nao vao</button>
      </div>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead><tr><th>Status</th><th>Adolescente</th><th>Responsavel</th><th>Contato</th><th>Transporte</th><th>Saude</th><th>Data</th><th></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="8" class="empty">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="ov" id="ov" onclick="closeFOv(event)">
  <div class="ficha">
    <div class="fhd"><div class="fhd-l"><div class="fav" id="fAv">?</div><div><div class="fnm" id="fNm">-</div><div class="fsb" id="fSb">-</div></div></div><button class="fcls" onclick="closeModal()">x</button></div>
    <div class="fbody">
      <div class="stblock"><label>Status de participacao</label>
        <select class="stsel" id="m_confirmado">
          <option value="pendente">Pendente</option>
          <option value="confirmado">Confirmado - vai ao acampamento</option>
          <option value="nao-vai">Nao vai ao acampamento</option>
        </select>
      </div>
      <div class="fsec"><div class="fsec-t">Adolescente</div>
        <div class="fgrid one"><div class="fi"><label>Nome</label><input type="text" id="m_nome_adol"></div></div>
        <div class="fgrid"><div class="fi"><label>CPF</label><input type="text" id="m_cpf_adol"></div><div class="fi"><label>RG</label><input type="text" id="m_rg_adol"></div></div>
        <div class="fgrid one"><div class="fi"><label>Data envio</label><div class="fi-ro" id="m_data_envio">-</div></div></div>
      </div>
      <div class="fsec"><div class="fsec-t">Responsavel</div>
        <div class="fgrid one"><div class="fi"><label>Nome</label><input type="text" id="m_nome_resp"></div></div>
        <div class="fgrid"><div class="fi"><label>CPF</label><input type="text" id="m_cpf_resp"></div><div class="fi"><label>Email</label><input type="email" id="m_email_resp"></div></div>
        <div class="fgrid"><div class="fi"><label>Tel principal</label><input type="text" id="m_tel1"></div><div class="fi"><label>Tel secundario</label><input type="text" id="m_tel2"></div></div>
      </div>
      <div class="fsec"><div class="fsec-t">Saude</div><div class="fgrid">
        <div class="fi"><label>Problema saude</label><input type="text" id="m_prob_saude"></div>
        <div class="fi"><label>Descricao</label><input type="text" id="m_desc_prob"></div>
        <div class="fi"><label>Medicamento</label><input type="text" id="m_medicamento"></div>
        <div class="fi"><label>Dosagem</label><input type="text" id="m_desc_med"></div>
        <div class="fi"><label>Alergia</label><input type="text" id="m_alergia"></div>
        <div class="fi"><label>Desc alergia</label><input type="text" id="m_desc_alergia"></div>
        <div class="fi"><label>Rest alimentar</label><input type="text" id="m_rest_alim"></div>
        <div class="fi"><label>Desc alimentar</label><input type="text" id="m_desc_alim"></div>
        <div class="fi"><label>Convenio</label><input type="text" id="m_convenio"></div>
        <div class="fi"><label>Nome convenio</label><input type="text" id="m_nome_convenio"></div>
        </div><div class="fgrid one"><div class="fi"><label>Autoriza medicacao</label><input type="text" id="m_aut_med"></div></div>
      </div>
      <div class="fsec"><div class="fsec-t">Viagem</div>
        <div class="fgrid"><div class="fi"><label>Autoriza viagem</label><input type="text" id="m_aut_viagem"></div><div class="fi"><label>Transporte</label><input type="text" id="m_transporte"></div></div>
        <div class="fgrid one"><div class="fi"><label>Observacoes</label><textarea id="m_obs"></textarea></div></div>
      </div>
    </div>
    <div class="ffoot"><button class="bcancel" onclick="closeModal()">Cancelar</button><button class="bsave" onclick="saveEdit()">Salvar alteracoes</button></div>
  </div>
</div>
<script>
var SUPA_URL = 'https://jwqjiwizcslkexslamrl.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3cWppd2l6Y3Nsa2V4c2xhbXJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjE0NDksImV4cCI6MjA5Njk5NzQ0OX0.snj7_tGqTsembQu6eS-s24sz2s-SPIt1H8-w1EOPdEI';

var allData = [];
var curF = 'todos';
var editId = null;

function api(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Prefer': 'return=minimal'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPA_URL + '/rest/v1/' + path, opts);
}

function showNotice(msg) {
  var el = document.getElementById('notice');
  el.textContent = msg;
  el.style.display = 'block';
}

function loadData() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="empty">Carregando...</td></tr>';
  document.getElementById('notice').style.display = 'none';
  api('formularios?order=created_at.desc&limit=1000')
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
    return r.json();
  })
  .then(function(data) {
    allData = data || [];
    updateStats();
    renderTable();
  })
  .catch(function(e) {
    showNotice('Erro: ' + e.message);
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="empty">Erro ao carregar</td></tr>';
  });
}

function updateStats() {
  document.getElementById('stTotal').textContent = allData.length;
  document.getElementById('stConf').textContent = allData.filter(function(r) { return r.confirmado === 'confirmado'; }).length;
  document.getElementById('stPend').textContent = allData.filter(function(r) { return !r.confirmado || r.confirmado === 'pendente'; }).length;
  document.getElementById('stNaoVai').textContent = allData.filter(function(r) { return r.confirmado === 'nao-vai'; }).length;
  document.getElementById('stOnib').textContent = allData.filter(function(r) { return r.transporte === 'PULSE'; }).length;
  document.getElementById('stSaude').textContent = allData.filter(function(r) { return r.prob_saude === 'Sim'; }).length;
}

function bdg(txt, cls) { return '<span class="badge ' + cls + '">' + txt + '</span>'; }

function onSearch() {
  var q = document.getElementById('hsearch').value.toLowerCase().trim();
  var res = document.getElementById('sres');
  if (!q || q.length < 2) { res.className = 'sres'; return; }
  var matches = allData.filter(function(r) {
    var hay = (r.nome_adol||'') + (r.nome_resp||'') + (r.cpf_adol||'') + (r.tel1||'') + (r.email_resp||'');
    return hay.toLowerCase().indexOf(q) >= 0;
  }).slice(0, 8);
  if (!matches.length) {
    res.innerHTML = '<div style="padding:16px;text-align:center;color:#bbb;font-size:13px">Nenhum resultado</div>';
    res.className = 'sres show'; return;
  }
  res.innerHTML = matches.map(function(r) {
    var w = (r.nome_adol || '?').split(' ');
    var ini = (w[0][0] + (w[1] ? w[1][0] : '')).toUpperCase();
    var st = r.confirmado === 'confirmado' ? bdg('Confirmado','b-conf') : r.confirmado === 'nao-vai' ? bdg('Nao vai','b-nao') : bdg('Pendente','b-pend');
    return '<div class="sri" onclick="openEdit(\'' + r.id + '\')">'
      + '<div style="display:flex;align-items:center"><div class="av">' + ini + '</div>'
      + '<div><div class="sri-name">' + (r.nome_adol||'-') + '</div>'
      + '<div class="sri-sub">Resp: ' + (r.nome_resp||'-') + ' - ' + (r.tel1||'-') + '</div></div></div>'
      + '<div>' + st + '</div></div>';
  }).join('');
  res.className = 'sres show';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.hero')) { document.getElementById('sres').className = 'sres'; }
});

function setF(f) {
  curF = f;
  document.querySelectorAll('.stat').forEach(function(s) { s.classList.remove('on'); });
  var el = document.getElementById('st-' + f);
  if (el) el.classList.add('on');
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-f') === f); });
  renderTable();
}
function setFBtn(btn) { setF(btn.getAttribute('data-f')); }

function renderTable() {
  var rows = allData.filter(function(r) {
    if (curF === 'confirmado' && r.confirmado !== 'confirmado') return false;
    if (curF === 'pendente' && r.confirmado && r.confirmado !== 'pendente') return false;
    if (curF === 'nao-vai' && r.confirmado !== 'nao-vai') return false;
    return true;
  });
  document.getElementById('tblCount').textContent = rows.length + (rows.length !== 1 ? ' registros' : ' registro');
  var tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhum registro</td></tr>'; return; }
  tbody.innerHTML = rows.map(function(r) {
    var st = r.confirmado === 'confirmado' ? bdg('Confirmado','b-conf') : r.confirmado === 'nao-vai' ? bdg('Nao vai','b-nao') : bdg('Pendente','b-pend');
    var tr = r.transporte === 'PULSE' ? bdg('Onibus','b-pulse') : bdg('Proprio','b-prop');
    var sd = r.prob_saude === 'Sim' ? bdg('Sim','b-sim') : bdg('Nao','b-ns');
    var dt = r.data_envio || (r.created_at || '').substring(0, 10) || '-';
    return '<tr onclick="openEdit(\'' + r.id + '\')">'
      + '<td>' + st + '</td>'
      + '<td><div class="cn">' + (r.nome_adol||'-') + '</div><div class="cs">' + (r.cpf_adol||'') + '</div></td>'
      + '<td><div class="cn">' + (r.nome_resp||'-') + '</div><div class="cs">' + (r.email_resp||'') + '</div></td>'
      + '<td><div class="cn">' + (r.tel1||'-') + '</div><div class="cs">' + (r.tel2||'') + '</div></td>'
      + '<td>' + tr + '</td><td>' + sd + '</td>'
      + '<td style="font-size:11px;color:#bbb">' + dt + '</td>'
      + '<td><button class="bver" onclick="event.stopPropagation();openEdit(\'' + r.id + '\')">Ver</button></td>'
      + '</tr>';
  }).join('');
}

function openEdit(id) {
  var r = allData.find(function(x) { return x.id === id; });
  if (!r) return;
  editId = id;
  var w = (r.nome_adol || '?').split(' ');
  document.getElementById('fAv').textContent = (w[0][0] + (w[1] ? w[1][0] : '')).toUpperCase();
  document.getElementById('fNm').textContent = r.nome_adol || '-';
  document.getElementById('fSb').textContent = 'Resp: ' + (r.nome_resp || '-');
  document.getElementById('m_data_envio').textContent = r.data_envio || (r.created_at || '').substring(0, 10) || '-';
  document.getElementById('m_confirmado').value = r.confirmado || 'pendente';
  ['nome_adol','cpf_adol','rg_adol','nome_resp','cpf_resp','tel1','tel2','email_resp',
   'prob_saude','desc_prob','medicamento','desc_med','alergia','desc_alergia',
   'rest_alim','desc_alim','convenio','nome_convenio','aut_med','aut_viagem','transporte','obs'
  ].forEach(function(f) { var el = document.getElementById('m_' + f); if (el) el.value = r[f] || ''; });
  document.getElementById('ov').classList.add('open');
  document.getElementById('sres').className = 'sres';
  document.getElementById('hsearch').value = '';
}

function closeFOv(e) { if (e.target === document.getElementById('ov')) closeModal(); }
function closeModal() { document.getElementById('ov').classList.remove('open'); editId = null; }

function saveEdit() {
  if (!editId) return;
  var payload = { confirmado: document.getElementById('m_confirmado').value };
  ['nome_adol','cpf_adol','rg_adol','nome_resp','cpf_resp','tel1','tel2','email_resp',
   'prob_saude','desc_prob','medicamento','desc_med','alergia','desc_alergia',
   'rest_alim','desc_alim','convenio','nome_convenio','aut_med','aut_viagem','transporte','obs'
  ].forEach(function(f) { var el = document.getElementById('m_' + f); if (el) payload[f] = el.value; });
  api('formularios?id=eq.' + editId, 'PATCH', payload)
  .then(function(r) {
    if (r.ok) {
      var idx = allData.findIndex(function(x) { return x.id === editId; });
      if (idx >= 0) Object.assign(allData[idx], payload);
      updateStats(); renderTable(); closeModal();
    } else { r.text().then(function(t) { alert('Erro: ' + t); }); }
  })
  .catch(function(e) { alert('Erro: ' + e.message); });
}

function exportXL() {
  if (!allData.length) { alert('Nenhum dado.'); return; }
  var heads = ['Status','Data Envio','Nome Adolescente','CPF','RG','Nome Responsavel','CPF Resp',
    'Tel Principal','Tel Secundario','Email','Problema Saude','Desc Saude','Medicamento','Desc Med',
    'Rest Alimentar','Desc Alim','Alergia','Desc Alergia','Autoriza Med','Convenio',
    'Nome Convenio','Autoriza Viagem','Transporte','Observacoes'];
  var rows = allData.map(function(r) {
    return [r.confirmado,r.data_envio,r.nome_adol,r.cpf_adol,r.rg_adol,r.nome_resp,r.cpf_resp,
      r.tel1,r.tel2,r.email_resp,r.prob_saude,r.desc_prob,r.medicamento,r.desc_med,
      r.rest_alim,r.desc_alim,r.alergia,r.desc_alergia,r.aut_med,r.convenio,
      r.nome_convenio,r.aut_viagem,r.transporte,r.obs];
  });
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet([heads].concat(rows));
  ws['!cols'] = heads.map(function() { return { wch: 20 }; });
  XLSX.utils.book_append_sheet(wb, ws, 'Formularios');
  var d = new Date().toLocaleDateString('pt-BR').split('/').join('-');
  XLSX.writeFile(wb, 'Contramao_' + d + '.xlsx');
}

setInterval(loadData, 60000);
loadData();
</script>
